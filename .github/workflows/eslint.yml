name: ESLint

on:
  workflow_call:
    inputs:
      filter-path:
        default: ""
        description: "Filters a certain path to prevent running linter on unintended changes"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed files on path
        if: ${{ inputs.filter-path != '' }}
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            path:
              - '${{ inputs.filter-path }}**'

      - name: Detect package manager
        id: pm
        if: ${{ inputs.filter-path == '' || steps.filter.outputs.path == 'true' }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: ${{ (inputs.filter-path == '' || steps.filter.outputs.path == 'true') && steps.pm.outputs.manager == 'pnpm' }}
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: ${{ inputs.filter-path == '' || steps.filter.outputs.path == 'true' }}
        run: ${{ steps.pm.outputs.manager }} install

      - name: Run
        if: ${{ inputs.filter-path == '' || steps.filter.outputs.path == 'true' }}
        run: ${{ steps.pm.outputs.manager }} run lint