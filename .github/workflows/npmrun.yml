name: NPM Run

on:
  workflow_call:
    inputs:
      action:
        description: "npm/pnpm script(s) to run, comma or newline separated (e.g. 'lint' or 'test, lint'). Runs in order, stops on first failure."
        required: true
        type: string
      filter-path:
        default: ""
        description: "Filters a certain path to prevent running on unintended changes"
        required: false
        type: string
      node-version:
        default: "22"
        description: "Node.js version to use (e.g. '22', '24', 'lts/*'). pnpm 11+ requires Node >= 22.13"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed files on path
        if: ${{ inputs.filter-path != '' }}
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            path:
              - '${{ inputs.filter-path }}**'

      - name: Detect package manager
        id: pm
        if: ${{ inputs.filter-path == '' || steps.filter.outputs.path == 'true' }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: ${{ (inputs.filter-path == '' || steps.filter.outputs.path == 'true') && steps.pm.outputs.manager == 'pnpm' }}
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ inputs.node-version }}
        if: ${{ inputs.filter-path == '' || steps.filter.outputs.path == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        if: ${{ inputs.filter-path == '' || steps.filter.outputs.path == 'true' }}
        run: ${{ steps.pm.outputs.manager }} install

      - name: Run
        if: ${{ inputs.filter-path == '' || steps.filter.outputs.path == 'true' }}
        env:
          ACTIONS: ${{ inputs.action }}
          MANAGER: ${{ steps.pm.outputs.manager }}
        run: |
          echo "$ACTIONS" | tr ',' '\n' | while IFS= read -r script; do
            script="$(echo "$script" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            [ -z "$script" ] && continue
            echo "::group::$MANAGER run $script"
            "$MANAGER" run "$script"
            echo "::endgroup::"
          done
